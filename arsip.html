<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arsip Tugas TIK – Risma Ika Nur Faidah</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0a2342;--mid:#1a4a7a;--sky:#5bafd6;--pale:#c8e6f5;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:linear-gradient(160deg,var(--navy) 0%,var(--mid) 60%,var(--sky) 100%);font-family:'DM Sans',sans-serif;padding:40px 20px 60px;position:relative;}
    .sky-bg{position:fixed;inset:0;z-index:0;background:linear-gradient(170deg,#0a2342 0%,#1a4a7a 50%,#5bafd6 85%,#c8e6f5 100%);}
    .clouds{position:fixed;inset:0;z-index:1;pointer-events:none;}
    .cloud{position:absolute;background:rgba(255,255,255,0.13);border-radius:50px;filter:blur(18px);animation:drift var(--speed,40s) linear infinite;}
    .cloud::before,.cloud::after{content:'';position:absolute;background:inherit;border-radius:50%;}
    .cloud::before{width:60%;height:160%;top:-40%;left:15%;}
    .cloud::after{width:45%;height:130%;top:-25%;right:10%;}
    @keyframes drift{from{transform:translateX(-120%)}to{transform:translateX(110vw)}}
    .container{position:relative;z-index:10;max-width:600px;margin:0 auto;}
    .back-btn{display:inline-flex;align-items:center;gap:7px;color:rgba(255,255,255,0.7);font-size:0.82rem;text-decoration:none;margin-bottom:28px;transition:color 0.2s;}
    .back-btn:hover{color:#fff;}
    .back-btn svg{width:16px;height:16px;fill:currentColor;}
    .page-header{text-align:center;margin-bottom:32px;animation:fadeUp 0.6s ease both;}
    .page-icon{font-size:3rem;margin-bottom:12px;display:block;}
    .page-title{font-family:'Playfair Display',serif;font-size:2rem;color:#fff;margin-bottom:6px;}
    .page-sub{font-size:0.82rem;color:var(--pale);font-weight:300;}
    .divider{width:50px;height:3px;background:linear-gradient(90deg,var(--sky),var(--pale));border-radius:2px;margin:14px auto;}
    .empty-card{
      background:rgba(255,255,255,0.09);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:24px;
      padding:52px 28px;
      text-align:center;
      box-shadow:0 16px 40px rgba(10,35,66,0.3);
      animation:fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    .empty-icon{font-size:3.5rem;margin-bottom:16px;display:block;opacity:0.5;}
    .empty-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:#fff;margin-bottom:8px;}
    .empty-desc{font-size:0.82rem;color:rgba(255,255,255,0.4);line-height:1.7;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .footer-note{text-align:center;margin-top:30px;font-size:0.72rem;color:rgba(255,255,255,0.25);letter-spacing:0.08em;position:relative;z-index:10;}
  </style>
</head>
<body>
<div class="sky-bg"></div>
<div class="clouds" id="clouds"></div>
<div class="container">
  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Kembali ke Beranda
  </a>
  <div class="page-header">
    <span class="page-icon">📂</span>
    <h1 class="page-title">Arsip Tugas TIK</h1>
    <div class="divider"></div>
    <p class="page-sub">Kumpulan tugas Teknologi Informasi & Komunikasi</p>
  </div>
  <div class="empty-card">
    <span class="empty-icon">🗂️</span>
    <p class="empty-title">Belum Ada Tugas</p>
    <p class="empty-desc">Arsip tugas TIK akan segera tersedia.<br>Pantau terus halaman ini ya!</p>
  </div>
</div>
<p class="footer-note">© 2025 Risma Ika Nur Faidah · PPNS</p>
<script>
  const cloudsEl=document.getElementById('clouds');
  [{w:260,h:60,top:8,speed:60,opacity:0.10,delay:0},{w:380,h:75,top:30,speed:85,opacity:0.07,delay:-25},{w:200,h:50,top:60,speed:50,opacity:0.12,delay:-12}].forEach(c=>{
    const el=document.createElement('div');el.className='cloud';
    el.style.cssText=`width:${c.w}px;height:${c.h}px;top:${c.top}%;opacity:${c.opacity};--speed:${c.speed}s;animation-delay:${c.delay}s;`;
    cloudsEl.appendChild(el);
  });
</script>
</body>
</html>
